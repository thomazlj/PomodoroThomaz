<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="status" id="state">PAUSADO</div>

  <div class="timer-area">
    <div class="timer" id="studyTimer">60:00</div>

    <div class="progress-track" aria-label="Progresso do cronômetro">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="totals">
      <div>⏱️ Foco Total: <span id="totalFocus">00:00</span></div>
      <div>🚨 Distração Total: <span id="totalDistraction">00:00</span></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat red stat-inline">
      ⚠️ Distração
      <span id="distractionTimer">00:00</span>
    </div>

    <div class="stat green stat-inline">
      🔄 Ciclos
      <span>
        <span id="pomodoros">0</span>/<span id="pomodoroMax">4</span>
      </span>
    </div>
  </div>

  <div class="controls">
    <button id="distractBtn" class="danger" onclick="distract()">☕ Me Distrai</button>
    <button id="focusBtn" class="success" onclick="returnToFocus()">▶️ Voltar a Focar</button>
    <button id="skipFocusBtn" class="ghost" onclick="skipFocus()">⏭ Pular Foco</button>
    <button id="skipBreakBtn" class="ghost" onclick="skipBreak()">⏭ Pular Descanso</button>
    <button class="ghost" onclick="togglePause()">⏯</button>
    <button class="ghost" onclick="resetAll()">↻</button>
    <button class="ghost" onclick="togglePiP()">🗔 PiP</button>
  </div>

  <div class="settings-panel">
    <h3>Configurar tempos</h3>

    <div class="settings-grid">
      <label>
        Foco (min)
        <input id="studyMinutesInput" type="number" min="1" max="1440" value="60">
      </label>

      <label>
        Descanso curto (min)
        <input id="shortBreakInput" type="number" min="1" max="1440" value="10">
      </label>

      <label>
        Descanso longo (min)
        <input id="longBreakInput" type="number" min="1" max="1440" value="30">
      </label>

      <label>
        Ciclos até descanso longo
        <input id="pomodoroMaxInput" type="number" min="1" max="100" value="4">
      </label>
    </div>

    <button class="success apply-settings" onclick="applyTimerSettings()">
      Aplicar tempos
    </button>

    <div class="settings-message" id="settingsMessage"></div>
  </div>

  <div class="option-row">
    ⚙️ Início automático:
    <button class="ghost" onclick="toggleAutoStart()" id="autoStartBtn">OFF</button>
  </div>

  <div class="option-row">
    ⏩ Velocidade:
    <select onchange="setSpeed(this.value)">
      <option value="1">1x</option>
      <option value="10">10x</option>
      <option value="60">1min</option>
      <option value="300">5min</option>
    </select>
  </div>

  <div class="history">
    <div class="history-header">
      <h3>Histórico</h3>
      <button class="ghost" onclick="clearHistory()">🗑 Limpar</button>
    </div>
    <ul id="historyList"></ul>
  </div>

  <video id="pipVideo" muted playsinline style="display:none;"></video>

  <script src="script.js"></script>
</body>
</html>
